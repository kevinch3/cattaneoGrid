name: Scrape & Deploy

on:
  schedule:
    - cron: '30 23 * * 0'  # weekly, Sunday 23:30 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: crawler
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        working-directory: crawler
        env:
          SCRAPY_SETTINGS_MODULE: CattaneoGrid.settings
        run: scrapy crawl podcastspider

      - name: Commit updated db.json
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db.json
          if git diff --staged --quiet; then
            echo "No changes to db.json"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update db.json [$(date -u +%Y-%m-%d)]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main  # pick up the db.json commit if scrape job pushed

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Copy db.json to assets
        run: cp data/db.json app/src/assets/db.json

      - name: Build
        working-directory: app
        run: npm run prerender:gh

      - name: Deploy to GitHub Pages
        working-directory: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx angular-cli-ghpages --dir=dist/cattaneo-grid-app/browser --branch=gh-pages
