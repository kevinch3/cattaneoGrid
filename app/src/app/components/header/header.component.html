<header class="app-header">
  <span class="logo">CATTANEO</span>
  <div class="controls">

    <!-- Theme picker -->
    <div class="menu-wrap">
      <button class="menu-btn" [class.open]="openMenu() === 'theme'"
              (click)="toggleMenu('theme', $event)" aria-label="Theme">
        <!-- Four swatches icon -->
        <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true">
          <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2" fill="currentColor"/>
          <rect x="9"   y="1.5" width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.55"/>
          <rect x="1.5" y="9"   width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.3"/>
          <rect x="9"   y="9"   width="5.5" height="5.5" rx="1.2" fill="currentColor" opacity="0.15"/>
        </svg>
      </button>
      @if (openMenu() === 'theme') {
        <div class="dropdown">
          @for (opt of theme.presets; track opt.label; let i = $index) {
            <button class="option" [class.selected]="theme.activePreset() === opt"
                    (click)="selectTheme(i)">{{ opt.label }}</button>
          }
        </div>
      }
    </div>

    <!-- Sort picker -->
    <div class="menu-wrap">
      <button class="menu-btn" [class.open]="openMenu() === 'sort'"
              (click)="toggleMenu('sort', $event)" aria-label="Sort by">
        <!-- Descending lines + arrow icon -->
        <svg viewBox="0 0 16 16" width="15" height="15" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <path d="M2 4h8M2 8h5M2 12h3"/>
          <path d="M12 3v10M10 11l2 2 2-2"/>
        </svg>
      </button>
      @if (openMenu() === 'sort') {
        <div class="dropdown">
          @for (opt of sort.options(); track opt.value) {
            <button class="option" [class.selected]="sort.selectedField() === opt.value"
                    (click)="selectSort(opt.value)">{{ opt.label }}</button>
          }
        </div>
      }
    </div>

  </div>
</header>
