<!-- app/src/app/components/header/header.component.html -->

<!-- Full header — hidden by SCSS in legacy mode -->
<header class="app-header">
  <span class="logo">CATTANEO</span>
  <div class="controls">
    <div class="sort-wrap">
      <label class="sort-label" for="header-theme">Theme</label>
      <select class="theme-select" id="header-theme" (change)="onThemeChange($event)">
        @for (opt of theme.presets; track opt.label; let i = $index) {
          <option [value]="i" [selected]="theme.activePreset() === opt">{{ opt.label }}</option>
        }
      </select>
    </div>
    <div class="sort-wrap">
      <label class="sort-label" for="header-sort">Sort</label>
      <select id="header-sort" (change)="onSortChange($event)">
        @for (opt of sort.options(); track opt.value) {
          <option [value]="opt.value" [selected]="sort.selectedField() === opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>
  </div>
</header>
