<!-- app/src/app/components/episodes-grid/episodes-grid.component.html -->
<div class="episode-grid" [class.sorting]="animatingSort"
  (click)="onGridMouseEvent($event)"
  (contextmenu)="onGridMouseEvent($event)">

  @for (episode of episodes; track episode.episodio; let i = $index) {
    <div
      [style.background-color]="heatmap.getColor(episode.link ?? '')()"
      [style.animation-delay]="animatingSort ? (Math.min(i, 20) * 70) + 'ms' : '0ms'"
      class="episode-item"
      [attr.data-episode-id]="episode.link"
      (click)="onEpisodeClick(i)">
      <div class="episodio">{{ episode.episodio }}</div>
    </div>

    @if (selectedIndex === i) {
      <div #detailRow class="episode-detail-row"
        [style.background-color]="heatmap.getColor(episode.link ?? '')()">
        <div class="titulo">{{ episode.titulo }}</div>
        <div class="meta">
          <span class="likes">
            <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor" aria-hidden="true" style="vertical-align:-1px"><path d="M8 14s-6-3.9-6-8a4 4 0 0 1 6-3.46A4 4 0 0 1 14 6c0 4.1-6 8-6 8z"/></svg>
            {{ episode.likes }}
          </span>
          <span class="descargas">
            <svg viewBox="0 0 16 16" width="11" height="11" fill="currentColor" aria-hidden="true" style="vertical-align:-1px"><path d="M8 12L2 6h4V1h4v5h4L8 12z"/></svg>
            {{ episode.descargas }}
          </span>
          @if (trackCount(episode.tracklist) > 0) {
            <span class="track-count">{{ trackCount(episode.tracklist) }} tracks</span>
          }
        </div>
        <div [innerHTML]="tracklistWithBreaks(episode.tracklist)" class="tracklist"></div>
      </div>
    }
  }

</div>

<!-- Legacy-only sort dropdown (grid controls itself when no header) -->
<div class="legacy-sort-wrap">
  <label for="orderby">Ordenar:</label>
  <select id="orderby" (change)="onLegacySortChange($event)">
    @for (opt of sort.options(); track opt.value) {
      <option [value]="opt.value" [selected]="sort.selectedField() === opt.value">{{ opt.label }}</option>
    }
  </select>
</div>
