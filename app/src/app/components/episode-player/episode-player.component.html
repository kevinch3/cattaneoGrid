<!-- app/src/app/components/episode-player/episode-player.component.html -->
@if (currentContent) {
  <div class="floating-player">
    <button class="play-btn" (click)="togglePlay()" [attr.aria-label]="isPlaying ? 'Pause' : 'Play'">
      @if (isPlaying) {
        <!-- Pause: two vertical bars — inline SVG avoids Safari emoji rendering -->
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
          <rect x="2" y="1" width="5" height="14" rx="1"/>
          <rect x="9" y="1" width="5" height="14" rx="1"/>
        </svg>
      } @else {
        <!-- Play: right-pointing triangle -->
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
          <polygon points="3,1 15,8 3,15"/>
        </svg>
      }
    </button>

    <!-- Visualizer toggle: inline SVG bar-chart icon avoids emoji rendering issues -->
    <button class="vis-btn" (click)="showVisualizer = !showVisualizer"
      [class.active]="showVisualizer"
      [attr.aria-label]="showVisualizer ? 'Hide visualizer' : 'Show visualizer'">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
        <rect x="1"  y="8"  width="3" height="7" rx="1"/>
        <rect x="5"  y="4"  width="3" height="11" rx="1"/>
        <rect x="9"  y="6"  width="3" height="9" rx="1"/>
        <rect x="13" y="2"  width="3" height="13" rx="1"/>
      </svg>
    </button>

    <div class="track-info">
      <div class="track-title">{{ currentContent.title }}</div>
      @defer (when showVisualizer) {
        <app-visualizer />
      } @placeholder {
        <div class="vis-placeholder"></div>
      }
      <!-- Seek bar: styled range input. --progress-pct drives the CSS fill gradient. -->
      <input
        type="range"
        class="seek-bar"
        [style.--progress-pct]="progressPercent + '%'"
        [value]="progressPercent"
        min="0" max="100" step="0.1"
        [class.dragging]="isDragging"
        (pointerdown)="isDragging = true"
        (pointerup)="isDragging = false"
        (pointercancel)="isDragging = false"
        (input)="onSeek($event)"
        aria-label="Seek"
      >
    </div>

    <!-- Native audio element — hidden in non-legacy themes; legacy CSS shows it with controls -->
    <audio #audioPlayer
      controls
      (timeupdate)="onTimeUpdate()"
      (loadedmetadata)="onMetadata()"
      (ended)="onAudioEnded()"
      style="display:none">
      <source [src]="currentContent.link" type="audio/mpeg">
    </audio>
  </div>
}
