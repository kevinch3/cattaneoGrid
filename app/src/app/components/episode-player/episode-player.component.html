<!-- app/src/app/components/episode-player/episode-player.component.html -->
@if (currentContent) {
  <div class="floating-player">
    <button class="play-btn" (click)="togglePlay()" [attr.aria-label]="isPlaying ? 'Pause' : 'Play'">
      {{ isPlaying ? '⏸' : '▶' }}
    </button>

    <div class="track-info">
      <div class="track-title">{{ currentContent.title }}</div>
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="progressPercent"></div>
      </div>
    </div>

    <!-- Native audio element — hidden, driven by component logic -->
    <audio #audioPlayer (timeupdate)="onTimeUpdate()" (ended)="onAudioEnded()" style="display:none">
      <source [src]="currentContent.link" type="audio/mpeg">
    </audio>
  </div>
}
