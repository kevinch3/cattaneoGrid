  <script>
    (function() {
      var preset = null;
      try { preset = JSON.parse(localStorage.getItem('theme-preset')); } catch(e) {}
      var style = (preset && preset.style) || 'default';
      if (style === 'legacy') { style = 'default'; try { localStorage.removeItem('theme-preset'); } catch(e) {} }
      var mode = (preset && preset.mode) || 'system';
      var resolved = mode === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.body.setAttribute('data-theme', style);
      document.body.setAttribute('data-mode', resolved);
      var link = document.createElement('link');
      link.id = 'theme-css';
      link.rel = 'stylesheet';
      link.href = '/assets/themes/theme-' + style + '.css';
      document.head.appendChild(link);
    })();
  </script>
